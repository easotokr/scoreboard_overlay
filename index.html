<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
  }

  .overlay-wrap {
    display: inline-flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
  }

  /* === SCOREBOARD === */
  .scoreboard {
    display: flex;
    align-items: stretch;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.12);
    background: rgba(8,12,24,0.92);
  }

  .team-block {
    width: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 10px 10px;
  }
  .team-block.home { background: rgba(15,25,60,0.95); }
  .team-block.away { background: rgba(40,10,10,0.95); }

  .team-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 2px;
  }
  .team-score {
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    color: #fff;
  }
  .team-fouls-label {
    margin-top: 5px;
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .foul-dots {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .foul-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: transparent;
  }
  .foul-dot.active { background: #f59e0b; border-color: #f59e0b; }

  .center-block {
    width: 100px;
    background: rgba(5,8,18,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
    gap: 4px;
    border-left: 1px solid rgba(255,255,255,0.07);
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .period-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }
  .period-value {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .period-suffix {
    font-size: 8px;
    color: rgba(255,255,255,0.35);
    margin-top: -2px;
  }
  .divider-h {
    width: 36px;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 2px 0;
  }
  .timer-value {
    font-size: 16px;
    font-weight: 700;
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }
  .timer-label {
    font-size: 8px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* === TARJETAS === */
  .cards-row {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 4px;
    min-height: 4px;
  }
  .card-zone {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    min-height: 4px;
  }
  .card-zone.away-cards { justify-content: flex-end; }

  .penalty-card {
    width: 30px;
    height: 42px;
    border-radius: 3px;
    transform: rotate(45deg);
    flex-shrink: 0;
    border: 1.5px solid rgba(0,0,0,0.3);
    transition: opacity 0.3s;
  }
  .penalty-card.blue   { background: #2563eb; }
  .penalty-card.yellow { background: #eab308; }
  .penalty-card.red    { background: #dc2626; }

  /* animación entrada tarjeta */
  @keyframes cardIn {
    from { opacity: 0; transform: rotate(45deg) scale(0.5); }
    to   { opacity: 1; transform: rotate(45deg) scale(1); }
  }
  .penalty-card.new { animation: cardIn 0.35s ease-out; }
</style>
</head>
<body>

<div class="overlay-wrap">

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="team-block home">
      <div class="team-name" id="home-name">LOCAL</div>
      <div class="team-score" id="home-score">0</div>
      <div class="team-fouls-label">faltas</div>
      <div class="foul-dots" id="home-dots"></div>
    </div>

    <div class="center-block">
      <div class="period-label">periodo</div>
      <div class="period-value" id="period-val">1</div>
      <div class="period-suffix" id="period-sfx">°</div>
      <div class="divider-h"></div>
      <div class="timer-value" id="timer-val">00:00</div>
      <div class="timer-label">tiempo</div>
    </div>

    <div class="team-block away">
      <div class="team-name" id="away-name">VISITA</div>
      <div class="team-score" id="away-score">0</div>
      <div class="team-fouls-label">faltas</div>
      <div class="foul-dots" id="away-dots"></div>
    </div>
  </div>

  <!-- TARJETAS -->
  <div class="cards-row">
    <div class="card-zone home-cards" id="home-cards"></div>
    <div class="card-zone away-cards" id="away-cards"></div>
  </div>

</div>

<script>
  const MAX_FOULS = 7;
  const PERIOD_SFX = { 1:'°', 2:'°', 3:'°', 4:'°', 5:' ET', 6:' P' };

  let state = {
    homeScore: 0, awayScore: 0,
    homeFouls: 0, awayFouls: 0,
    homeCards: [], awayCards: [],
    period: 1, seconds: 0,
    homeName: 'LOCAL', awayName: 'VISITA'
  };

  function render(s) {
    document.getElementById('home-score').textContent = s.homeScore;
    document.getElementById('away-score').textContent = s.awayScore;
    document.getElementById('home-name').textContent  = s.homeName;
    document.getElementById('away-name').textContent  = s.awayName;
    document.getElementById('period-val').textContent = s.period;
    document.getElementById('period-sfx').textContent = PERIOD_SFX[s.period] || '°';

    const m = Math.floor(s.seconds / 60);
    const sec = s.seconds % 60;
    document.getElementById('timer-val').textContent =
      String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');

    renderDots('home', s.homeFouls);
    renderDots('away', s.awayFouls);
    renderCards('home', s.homeCards);
    renderCards('away', s.awayCards);
  }

  function renderDots(team, fouls) {
    const el = document.getElementById(team + '-dots');
    el.innerHTML = '';
    for (let i = 0; i < MAX_FOULS; i++) {
      const d = document.createElement('div');
      d.className = 'foul-dot' + (i < fouls ? ' active' : '');
      el.appendChild(d);
    }
  }

  function renderCards(team, cards) {
    const el = document.getElementById(team + '-cards');
    el.innerHTML = '';
    cards.forEach(color => {
      const c = document.createElement('div');
      c.className = 'penalty-card ' + color;
      el.appendChild(c);
    });
  }

  // Escucha cambios desde control.html vía localStorage
  window.addEventListener('storage', e => {
    if (e.key === 'hockey_state' && e.newValue) {
      state = JSON.parse(e.newValue);
      render(state);
    }
  });

  // BroadcastChannel para misma pestaña/dispositivo
  const bc = new BroadcastChannel('hockey_overlay');
  bc.onmessage = e => {
    state = e.data;
    render(state);
  };

  // Carga estado inicial si existe
  const saved = localStorage.getItem('hockey_state');
  if (saved) { state = JSON.parse(saved); }
  render(state);
</script>
</body>
</html>
