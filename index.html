
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: 'Arial Black', Arial, sans-serif; }

  .overlay-root {
    width: 100%;
    background: transparent;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* === SCOREBOARD PRINCIPAL === */
  .scoreboard {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(8,12,24,0.92);
    max-width: 680px;
    margin: 0 auto;
  }

  .team-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px 12px;
    position: relative;
  }
  .team-block.home { background: rgba(15,25,60,0.95); }
  .team-block.away { background: rgba(40,10,10,0.95); }

  .team-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
  }
  .team-score {
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    text-shadow: none;
  }
  .team-fouls {
    margin-top: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .foul-dots {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    justify-content: center;
  }
  .foul-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent;
    cursor: pointer;
    transition: background 0.15s;
  }
  .foul-dot.active { background: #f59e0b; border-color: #f59e0b; }

  .center-block {
    width: 120px;
    flex-shrink: 0;
    background: rgba(5,8,18,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
    gap: 6px;
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .period-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  .period-value {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .period-suffix {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .divider-h {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }
  .timer-value {
    font-size: 18px;
    font-weight: 700;
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
  }
  .timer-label {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* === TARJETAS === */
  .cards-row {
    display: flex;
    justify-content: space-between;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    gap: 12px;
  }

  .card-zone {
    flex: 1;
    display: flex;
    gap: 6px;
    align-items: flex-start;
    min-height: 64px;
  }
  .card-zone.home-cards { justify-content: flex-start; }
  .card-zone.away-cards { justify-content: flex-end; }

  .penalty-card {
    width: 34px;
    height: 48px;
    border-radius: 4px;
    transform: rotate(45deg);
    position: relative;
    transition: transform 0.2s, opacity 0.2s;
    flex-shrink: 0;
    cursor: default;
    border: 1.5px solid rgba(0,0,0,0.3);
  }
  .penalty-card.blue   { background: #2563eb; }
  .penalty-card.yellow { background: #eab308; }
  .penalty-card.red    { background: #dc2626; }
  .penalty-card.empty  { background: transparent; border: 1.5px dashed rgba(255,255,255,0.12); }

  /* === CONTROLES === */
  .controls-section {
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .controls-title {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: Arial, sans-serif;
  }
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ctrl-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-family: Arial, sans-serif;
  }
  .ctrl-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s;
    font-family: Arial, sans-serif;
    letter-spacing: 0.5px;
  }
  .btn:hover { background: rgba(255,255,255,0.16); }
  .btn.danger { background: rgba(220,38,38,0.25); border-color: rgba(220,38,38,0.5); }
  .btn.danger:hover { background: rgba(220,38,38,0.45); }
  .btn.warn { background: rgba(234,179,8,0.2); border-color: rgba(234,179,8,0.5); color: #fbbf24; }
  .btn.warn:hover { background: rgba(234,179,8,0.35); }
  .btn.info { background: rgba(37,99,235,0.25); border-color: rgba(37,99,235,0.5); color: #93c5fd; }
  .btn.info:hover { background: rgba(37,99,235,0.4); }
  .btn.sm { padding: 4px 8px; font-size: 11px; }
  .btn.accent { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
  .btn.accent:hover { background: rgba(16,185,129,0.35); }

  .team-tag {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-family: Arial, sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 30px;
  }

  .period-ctrl { display: flex; gap: 6px; align-items: center; }
  .period-num {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    min-width: 20px;
    text-align: center;
    font-family: Arial, sans-serif;
  }

  .timer-ctrl { display: flex; gap: 6px; align-items: center; }
  .timer-display {
    font-size: 14px;
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    min-width: 48px;
  }
  .btn.running { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.6); color: #fca5a5; }

  .divider-v {
    width: 1px;
    background: rgba(255,255,255,0.07);
    align-self: stretch;
  }

  /* responsive */
  @media (max-width: 520px) {
    .team-score { font-size: 36px; }
    .center-block { width: 90px; }
    .controls-grid { grid-template-columns: 1fr; }
  }
</style>

<div class="overlay-root" style="background: #0f1117; min-height: 400px; border-radius: 12px;">

  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Tablero de control para partido de hockey en vivo</h2>

  <!-- SCOREBOARD -->
  <div class="scoreboard" id="scoreboard">
    <!-- HOME -->
    <div class="team-block home">
      <div class="team-name" id="home-name">LOCAL</div>
      <div class="team-score" id="home-score">0</div>
      <div class="team-fouls">faltas</div>
      <div class="foul-dots" id="home-dots"></div>
    </div>

    <!-- CENTER -->
    <div class="center-block">
      <div class="period-label">periodo</div>
      <div class="period-value" id="period-display">1</div>
      <div class="period-suffix" id="period-suffix">°</div>
      <div class="divider-h"></div>
      <div class="timer-value" id="timer-display">00:00</div>
      <div class="timer-label">tiempo</div>
    </div>

    <!-- AWAY -->
    <div class="team-block away">
      <div class="team-name" id="away-name">VISITA</div>
      <div class="team-score" id="away-score">0</div>
      <div class="team-fouls">faltas</div>
      <div class="foul-dots" id="away-dots"></div>
    </div>
  </div>

  <!-- TARJETAS -->
  <div class="cards-row">
    <div class="card-zone home-cards" id="home-cards"></div>
    <div class="card-zone away-cards" id="away-cards"></div>
  </div>

  <!-- CONTROLES -->
  <div class="controls-section">
    <div class="controls-title">panel de control — overlay</div>
    <div class="controls-grid">

      <!-- COL IZQUIERDA: LOCAL -->
      <div class="ctrl-group">
        <div class="ctrl-label">local</div>

        <div class="ctrl-row">
          <span class="team-tag">gol</span>
          <button class="btn sm" onclick="changeScore('home', 1)">+1</button>
          <button class="btn sm danger" onclick="changeScore('home', -1)">−1</button>
        </div>

        <div class="ctrl-row">
          <span class="team-tag">falta</span>
          <button class="btn sm" onclick="changeFoul('home', 1)">+1</button>
          <button class="btn sm danger" onclick="changeFoul('home', -1)">−1</button>
        </div>

        <div class="ctrl-row">
          <span class="team-tag" style="min-width:38px">tarjeta</span>
          <button class="btn sm info" onclick="addCard('home','blue')">azul</button>
          <button class="btn sm warn" onclick="addCard('home','yellow')">amarilla</button>
          <button class="btn sm danger" onclick="addCard('home','red')">roja</button>
          <button class="btn sm" onclick="removeCard('home')">✕</button>
        </div>
      </div>

      <!-- COL DERECHA: VISITA -->
      <div class="ctrl-group">
        <div class="ctrl-label">visita</div>

        <div class="ctrl-row">
          <span class="team-tag">gol</span>
          <button class="btn sm" onclick="changeScore('away', 1)">+1</button>
          <button class="btn sm danger" onclick="changeScore('away', -1)">−1</button>
        </div>

        <div class="ctrl-row">
          <span class="team-tag">falta</span>
          <button class="btn sm" onclick="changeFoul('away', 1)">+1</button>
          <button class="btn sm danger" onclick="changeFoul('away', -1)">−1</button>
        </div>

        <div class="ctrl-row">
          <span class="team-tag" style="min-width:38px">tarjeta</span>
          <button class="btn sm info" onclick="addCard('away','blue')">azul</button>
          <button class="btn sm warn" onclick="addCard('away','yellow')">amarilla</button>
          <button class="btn sm danger" onclick="addCard('away','red')">roja</button>
          <button class="btn sm" onclick="removeCard('away')">✕</button>
        </div>
      </div>

    </div>

    <!-- FILA INFERIOR: periodo + timer + reset -->
    <div class="ctrl-row" style="margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; gap: 10px; flex-wrap: wrap;">

      <div class="period-ctrl">
        <span class="ctrl-label" style="margin: 0;">periodo</span>
        <button class="btn sm" onclick="changePeriod(-1)">◀</button>
        <span class="period-num" id="period-ctrl-num">1</span>
        <button class="btn sm" onclick="changePeriod(1)">▶</button>
      </div>

      <div class="divider-v" style="height: 28px;"></div>

      <div class="timer-ctrl">
        <span class="ctrl-label" style="margin: 0;">reloj</span>
        <span class="timer-display" id="timer-ctrl-display">00:00</span>
        <button class="btn sm accent" id="timer-btn" onclick="toggleTimer()">▶ iniciar</button>
        <button class="btn sm" onclick="resetTimer()" style="font-size:10px;">reiniciar</button>
      </div>

      <div class="divider-v" style="height: 28px;"></div>

      <button class="btn sm danger" onclick="resetAll()">reset todo</button>

      <button class="btn sm" onclick="editNames()" style="font-size: 10px; color: rgba(255,255,255,0.5);">✎ nombres</button>
    </div>
  </div>

</div>

<script>
  const state = {
    homeScore: 0, awayScore: 0,
    homeFouls: 0, awayFouls: 0,
    homeCards: [], awayCards: [],
    period: 1,
    seconds: 0,
    running: false,
    timerInterval: null,
    homeName: 'LOCAL',
    awayName: 'VISITA'
  };

  const MAX_FOULS = 7;
  const MAX_CARDS = 4;
  const PERIOD_LABELS = { 1:'°', 2:'°', 3:'°', 4:'°', 5: ' ET', 6: ' P' };

  function render() {
    document.getElementById('home-score').textContent = state.homeScore;
    document.getElementById('away-score').textContent = state.awayScore;
    document.getElementById('period-display').textContent = state.period;
    document.getElementById('period-ctrl-num').textContent = state.period;
    const suffix = PERIOD_LABELS[state.period] || '°';
    document.getElementById('period-suffix').textContent = suffix;
    renderDots('home');
    renderDots('away');
    renderCards('home');
    renderCards('away');
    renderTimer();
    document.getElementById('home-name').textContent = state.homeName;
    document.getElementById('away-name').textContent = state.awayName;
  }

  function renderDots(team) {
    const fouls = team === 'home' ? state.homeFouls : state.awayFouls;
    const container = document.getElementById(team + '-dots');
    container.innerHTML = '';
    for (let i = 0; i < MAX_FOULS; i++) {
      const dot = document.createElement('div');
      dot.className = 'foul-dot' + (i < fouls ? ' active' : '');
      container.appendChild(dot);
    }
  }

  function renderCards(team) {
    const cards = team === 'home' ? state.homeCards : state.awayCards;
    const container = document.getElementById(team + '-cards');
    container.innerHTML = '';
    const slots = Math.max(cards.length, 1);
    for (let i = 0; i < slots; i++) {
      const card = document.createElement('div');
      card.className = 'penalty-card ' + (cards[i] || 'empty');
      container.appendChild(card);
    }
  }

  function renderTimer() {
    const m = Math.floor(state.seconds / 60);
    const s = state.seconds % 60;
    const str = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    document.getElementById('timer-display').textContent = str;
    document.getElementById('timer-ctrl-display').textContent = str;
    const btn = document.getElementById('timer-btn');
    if (state.running) {
      btn.textContent = '⏸ pausar';
      btn.classList.add('running');
      btn.classList.remove('accent');
    } else {
      btn.textContent = '▶ iniciar';
      btn.classList.remove('running');
      btn.classList.add('accent');
    }
  }

  function changeScore(team, delta) {
    if (team === 'home') state.homeScore = Math.max(0, state.homeScore + delta);
    else state.awayScore = Math.max(0, state.awayScore + delta);
    render();
  }

  function changeFoul(team, delta) {
    if (team === 'home') state.homeFouls = Math.min(MAX_FOULS, Math.max(0, state.homeFouls + delta));
    else state.awayFouls = Math.min(MAX_FOULS, Math.max(0, state.awayFouls + delta));
    render();
  }

  function addCard(team, color) {
    const cards = team === 'home' ? state.homeCards : state.awayCards;
    if (cards.length < MAX_CARDS) cards.push(color);
    render();
  }

  function removeCard(team) {
    const cards = team === 'home' ? state.homeCards : state.awayCards;
    if (cards.length > 0) cards.pop();
    render();
  }

  function changePeriod(delta) {
    state.period = Math.min(6, Math.max(1, state.period + delta));
    render();
  }

  function toggleTimer() {
    if (state.running) {
      clearInterval(state.timerInterval);
      state.running = false;
    } else {
      state.running = true;
      state.timerInterval = setInterval(() => {
        state.seconds++;
        renderTimer();
      }, 1000);
    }
    renderTimer();
  }

  function resetTimer() {
    clearInterval(state.timerInterval);
    state.running = false;
    state.seconds = 0;
    renderTimer();
  }

  function resetAll() {
    if (!confirm('¿Reiniciar todo el marcador?')) return;
    clearInterval(state.timerInterval);
    Object.assign(state, {
      homeScore: 0, awayScore: 0,
      homeFouls: 0, awayFouls: 0,
      homeCards: [], awayCards: [],
      period: 1, seconds: 0, running: false
    });
    render();
  }

  function editNames() {
    const h = prompt('Nombre equipo LOCAL:', state.homeName);
    if (h !== null && h.trim()) state.homeName = h.trim().toUpperCase();
    const a = prompt('Nombre equipo VISITA:', state.awayName);
    if (a !== null && a.trim()) state.awayName = a.trim().toUpperCase();
    render();
  }

  render();
</script>
