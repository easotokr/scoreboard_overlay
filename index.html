<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hockey Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
  }

  .overlay {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    gap: 0;
  }

  /* === PERIODO === */
  .top-bar {
    background: rgba(10,10,10,0.92);
    border-radius: 6px 6px 0 0;
    padding: 4px 24px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    font-weight: 700;
    position: relative;
    z-index: 3;
  }
  .top-bar.hidden { display: none; }

  /* === SCOREBOARD === */
  .scoreboard {
    width: 540px;
    display: flex;
    align-items: stretch;
    position: relative;
    height: 82px;
  }

  .band-home {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 64px 0 16px;
    clip-path: polygon(0 0, 100% 0, 86% 100%, 0 100%);
    background: #1e3a8a;
    position: relative;
    z-index: 1;
  }
  .band-away {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 16px 0 64px;
    clip-path: polygon(14% 0, 100% 0, 100% 100%, 0 100%);
    background: #991b1b;
    position: relative;
    z-index: 1;
  }

  /* === HEXAGONOS MARCADOR === */
  .center-hex {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    display: flex;
    align-items: center;
  }
  .hex-score {
    width: 64px;
    height: 82px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 900;
    color: #fff;
    clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 80% 100%, 20% 100%, 0% 50%);
  }
  .hex-score.home { background: #1d4ed8; }
  .hex-score.away { background: #b91c1c; }

  /* === CONTENIDO EQUIPOS === */
  .team-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .team-row.away { flex-direction: row-reverse; }

  .team-logo-wrap {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .team-logo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; border-radius: 50%;
    display: none;
  }
  .team-logo-wrap img.visible { display: block; }
  .team-logo-wrap .logo-placeholder {
    font-size: 10px; color: rgba(255,255,255,0.3);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .team-name {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    white-space: nowrap;
  }

  /* === BARRA INFERIOR === */
  .bottom-bar {
    width: 540px;
    display: flex;
    background: rgba(0,0,0,0.88);
    border-radius: 0 0 6px 6px;
    overflow: hidden;
  }
  .bottom-home {
    flex: 1;
    background: rgba(30,58,138,0.55);
    padding: 5px 20px 5px 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
  }
  .bottom-away {
    flex: 1;
    background: rgba(153,27,27,0.55);
    padding: 5px 16px 5px 20px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 7px;
    clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%);
  }
  .bottom-center {
    background: rgba(5,5,15,0.95);
    padding: 4px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    z-index: 2;
  }

  .foul-label {
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-family: Arial, sans-serif;
  }
  .foul-value {
    font-size: 20px;
    font-weight: 900;
    color: rgba(255,255,255,0.85);
    font-family: 'Arial Black', Arial, sans-serif;
    transition: color 0.2s;
  }
  .foul-value.f10 { color: #facc15; }
  .foul-value.f15 { color: #fb923c; }
  .foul-value.f20 { color: #f87171; }
  .foul-value.f25 { color: #ef4444; }
  .foul-value.f30 { color: #dc2626; }

  .timer-val {
    font-size: 15px;
    font-weight: 700;
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .timer-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .timer-lbl { font-size: 7px; color: rgba(255,255,255,0.25); letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; }

  /* === TARJETAS === */
  .cards-row {
    width: 540px;
    display: flex;
    justify-content: space-between;
    padding: 6px 8px 0;
    min-height: 6px;
  }
  .card-zone { display: flex; gap: 8px; align-items: flex-start; }
  .penalty-card {
    width: 26px; height: 36px;
    border-radius: 3px;
    transform: rotate(45deg);
    border: 1.5px solid rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  .penalty-card.blue   { background: #2563eb; }
  .penalty-card.yellow { background: #eab308; }
  .penalty-card.red    { background: #dc2626; }

  /* DOT CONEXION */
  .status-dot {
    position: fixed; bottom: 6px; right: 6px;
    width: 7px; height: 7px;
    border-radius: 50%; background: #ef4444;
  }
  .status-dot.online { background: #22c55e; }
</style>
</head>
<body>

<div class="overlay">

  <!-- PERIODO TOP -->
  <div class="top-bar" id="top-bar">1° Período</div>

  <!-- SCOREBOARD -->
  <div class="scoreboard">

    <div class="band-home" id="band-home">
      <div class="team-row home">
        <div class="team-logo-wrap" id="home-logo-wrap">
          <img id="home-logo" src="" alt="">
          <span class="logo-placeholder" id="home-logo-ph">HC</span>
        </div>
        <div class="team-name" id="home-name">LOCAL</div>
      </div>
    </div>

    <div class="center-hex">
      <div class="hex-score home" id="home-score">0</div>
      <div class="hex-score away" id="away-score">0</div>
    </div>

    <div class="band-away" id="band-away">
      <div class="team-row away">
        <div class="team-logo-wrap" id="away-logo-wrap">
          <img id="away-logo" src="" alt="">
          <span class="logo-placeholder" id="away-logo-ph">HC</span>
        </div>
        <div class="team-name" id="away-name">VISITA</div>
      </div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-home">
      <span class="foul-label">faltas</span>
      <span class="foul-value" id="home-fouls">0</span>
    </div>
    <div class="bottom-center" id="timer-center">
      <div class="timer-wrap">
        <div class="timer-val" id="timer-val">00:00</div>
        <div class="timer-lbl">tiempo</div>
      </div>
    </div>
    <div class="bottom-away">
      <span class="foul-value" id="away-fouls">0</span>
      <span class="foul-label">faltas</span>
    </div>
  </div>

  <!-- TARJETAS -->
  <div class="cards-row">
    <div class="card-zone" id="home-cards"></div>
    <div class="card-zone" id="away-cards"></div>
  </div>

</div>

<div class="status-dot" id="status-dot"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:"AIzaSyCww4IjaJESkgFWeo97qOjkIWgyXczFstg",
    authDomain:"scoreboard-overlay-a462f.firebaseapp.com",
    databaseURL:"https://scoreboard-overlay-a462f-default-rtdb.firebaseio.com",
    projectId:"scoreboard-overlay-a462f",
    storageBucket:"scoreboard-overlay-a462f.firebasestorage.app",
    messagingSenderId:"117646185962",
    appId:"1:117646185962:web:7763fcb47c7f901cc60e93"
  });

  var db  = firebase.database();
  var dot = document.getElementById('status-dot');
  var PERIOD_LABELS = {1:'1° Período',2:'2° Período',3:'3° Período',4:'4° Período',5:'Tiempo Extra',6:'Penales'};
  var FOUL_MILESTONES = [10,15,20,25,30];

  function fmtTime(s){
    s = Math.max(0, s);
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  function foulClass(n){
    if(n===10) return 'f10';
    if(n===15) return 'f15';
    if(n===20) return 'f20';
    if(n===25) return 'f25';
    if(n===30) return 'f30';
    return '';
  }

  function applyLogo(team, url, name){
    var img = document.getElementById(team+'-logo');
    var ph  = document.getElementById(team+'-logo-ph');
    if(url && url.trim()){
      img.src = url.trim();
      img.className = 'visible';
      ph.style.display = 'none';
    } else {
      img.className = '';
      img.src = '';
      ph.style.display = '';
      ph.textContent = (name||team).substring(0,2).toUpperCase();
    }
  }

  function applyColors(d){
    var bh = document.getElementById('band-home');
    var ba = document.getElementById('band-away');
    var hc = d.homeColors || {};
    var ac = d.awayColors || {};
    bh.style.background = hc.bgColor || '#1e3a8a';
    ba.style.background = ac.bgColor || '#991b1b';
    document.getElementById('home-name').style.color = hc.nameColor || '#fff';
    document.getElementById('away-name').style.color = ac.nameColor || '#fff';
    if(hc.borderColor){
      document.querySelector('.scoreboard').style.outline = '2px solid '+hc.borderColor;
    }
    var hScore = document.getElementById('home-score');
    var aScore = document.getElementById('away-score');
    hScore.style.background = hc.bgColor || '#1d4ed8';
    aScore.style.background = ac.bgColor || '#b91c1c';
  }

  function renderCards(team, cards){
    var el = document.getElementById(team+'-cards');
    el.innerHTML = '';
    var arr = Array.isArray(cards) ? cards : (cards ? Object.values(cards) : []);
    arr.forEach(function(color){
      var c = document.createElement('div');
      c.className = 'penalty-card ' + color;
      el.appendChild(c);
    });
  }

  function render(d){
    // Nombres
    document.getElementById('home-name').textContent = d.homeName || 'LOCAL';
    document.getElementById('away-name').textContent = d.awayName || 'VISITA';

    // Marcador
    document.getElementById('home-score').textContent = d.homeScore || 0;
    document.getElementById('away-score').textContent = d.awayScore || 0;

    // Período
    var topBar = document.getElementById('top-bar');
    topBar.textContent = PERIOD_LABELS[d.period||1] || (d.period+'° Período');

    // Cronómetro
    var tc = document.getElementById('timer-center');
    var showTimer = d.showTimer !== false;
    tc.style.display = showTimer ? 'flex' : 'none';
    if(showTimer) document.getElementById('timer-val').textContent = fmtTime(d.seconds||0);

    // Faltas
    var hf = d.homeFouls || 0;
    var af = d.awayFouls || 0;
    var hfEl = document.getElementById('home-fouls');
    var afEl = document.getElementById('away-fouls');
    hfEl.textContent = hf;
    hfEl.className = 'foul-value ' + foulClass(hf);
    afEl.textContent = af;
    afEl.className = 'foul-value ' + foulClass(af);

    // Logos
    applyLogo('home', d.homeLogo, d.homeName);
    applyLogo('away', d.awayLogo, d.awayName);

    // Colores
    applyColors(d);

    // Tarjetas
    renderCards('home', d.homeCards);
    renderCards('away', d.awayCards);
  }

  db.ref('match').on('value', function(snap){
    dot.className = 'status-dot online';
    var data = snap.val();
    if(data) render(data);
  }, function(){ dot.className = 'status-dot'; });

  setInterval(function(){
    db.ref('match').once('value').then(function(snap){
      dot.className = 'status-dot online';
      var data = snap.val(); if(data) render(data);
    }).catch(function(){ dot.className = 'status-dot'; });
  }, 3000);
</script>
</body>
</html>
